# Netlify build configuration.
# Serves the existing root site as-is and mounts the built Groundwork app
# at /groundwork/. Applies to production deploys and PR deploy previews.

[build]
  command = "bash scripts/build-site.sh"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"
  # The account-enabled deployment (the app on the Azure Static Web App).
  # The Netlify copy shows a sign-in button that hands users off here.
  VITE_ACCOUNT_URL = "https://www.groundwork-security.com/"
  # Stripe Payment Link for Groundwork Pro (kept in sync with the Azure build).
  VITE_UPGRADE_URL = "https://buy.stripe.com/eVqcN7a7h4VAe304Nw2Nq00"
