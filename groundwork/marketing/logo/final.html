<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif; background: #333; -webkit-font-smoothing: antialiased; }
  svg { display:block; }

  #sheet {
    width: 1600px; padding: 80px; color: #e8edf6;
    background:
      radial-gradient(1100px 700px at 85% -6%, rgba(79,140,255,0.16), transparent 60%),
      radial-gradient(900px 600px at -6% 106%, rgba(62,207,142,0.10), transparent 60%),
      #0c111b;
  }
  .head { font-size: 26px; color:#7fa8ff; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; margin-bottom: 44px; }

  .hero { display:flex; align-items:center; gap: 44px; margin-bottom: 70px; }
  .hero .lockup { display:flex; align-items:center; gap: 30px; }
  .hero .lockup svg { width: 150px; height: 150px; }
  .hero .lockup .wm { font-size: 96px; font-weight: 800; letter-spacing: -0.03em; }

  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 30px; }
  .tile { border-radius: 24px; padding: 44px; display:flex; flex-direction:column; align-items:center; gap: 26px; min-height: 300px; justify-content:center; }
  .tile .cap { font-size: 20px; font-weight: 700; }
  .tile.dark { background:#0c111b; border:1px solid rgba(255,255,255,0.09); }
  .tile.dark .cap { color:#9aa8c0; }
  .tile.light { background:#f4f7fc; }
  .tile.light .cap { color:#5a6b86; }
  .tile.blue { background:#4f8cff; }
  .tile.blue .cap { color:#e8efff; }
  .tile svg { width: 128px; height: 128px; }

  .badge-row { display:flex; align-items:flex-end; gap: 48px; margin-bottom: 60px; }
  .badge { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .badge .cap { font-size:18px; color:#9aa8c0; font-weight:600; }
  .badge .icon { border-radius: 22%; overflow:hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }

  .favbar { display:flex; align-items:flex-end; gap: 34px; }
  .favbar .fav { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .favbar .fav .chip { background:#0c111b; border:1px solid rgba(255,255,255,0.1); border-radius: 20%; display:flex; align-items:center; justify-content:center; }
  .favbar .fav .cap { color:#9aa8c0; font-size:16px; font-weight:600; }
  .favnote { color:#9aa8c0; font-size: 20px; max-width: 560px; line-height:1.5; padding-bottom: 6px; }

  .sep { height:1px; background: rgba(255,255,255,0.08); margin: 60px 0; }
</style>
</head>
<body>
<div id="sheet">
  <div class="head">Groundwork · brand mark</div>

  <div class="hero">
    <div class="lockup">
      <svg viewBox="0 0 100 100"><rect x="39" y="20" width="22" height="15" rx="7" fill="#3ecf8e"/><rect x="29" y="42.5" width="42" height="15" rx="7" fill="#7fa8ff"/><rect x="15" y="65" width="70" height="16" rx="8" fill="#4f8cff"/></svg>
      <span class="wm">Groundwork</span>
    </div>
  </div>

  <!-- On backgrounds -->
  <div class="row">
    <div class="tile dark">
      <svg viewBox="0 0 100 100"><rect x="39" y="20" width="22" height="15" rx="7" fill="#3ecf8e"/><rect x="29" y="42.5" width="42" height="15" rx="7" fill="#7fa8ff"/><rect x="15" y="65" width="70" height="16" rx="8" fill="#4f8cff"/></svg>
      <div class="cap">Primary · on dark</div>
    </div>
    <div class="tile light">
      <svg viewBox="0 0 100 100"><rect x="39" y="20" width="22" height="15" rx="7" fill="#3ecf8e"/><rect x="29" y="42.5" width="42" height="15" rx="7" fill="#1f57c9"/><rect x="15" y="65" width="70" height="16" rx="8" fill="#1f57c9"/></svg>
      <div class="cap">On light</div>
    </div>
    <div class="tile blue">
      <svg viewBox="0 0 100 100"><rect x="39" y="20" width="22" height="15" rx="7" fill="#ffffff"/><rect x="29" y="42.5" width="42" height="15" rx="7" fill="#ffffff" opacity="0.85"/><rect x="15" y="65" width="70" height="16" rx="8" fill="#ffffff"/></svg>
      <div class="cap">Reversed · on brand blue</div>
    </div>
  </div>

  <div class="sep"></div>

  <!-- App icon + favicon -->
  <div class="head" style="margin-bottom:36px;">App icon &amp; favicon</div>
  <div class="badge-row">
    <div class="badge">
      <div class="icon"><svg width="200" height="200" viewBox="0 0 100 100"><rect width="100" height="100" fill="#0c111b"/><rect x="39" y="20" width="22" height="15" rx="7" fill="#3ecf8e"/><rect x="29" y="42.5" width="42" height="15" rx="7" fill="#7fa8ff"/><rect x="15" y="65" width="70" height="16" rx="8" fill="#4f8cff"/></svg></div>
      <div class="cap">App icon 512px</div>
    </div>
    <div class="favbar">
      <div class="fav"><div class="chip" style="width:96px;height:96px;"><svg width="64" height="64" viewBox="0 0 100 100"><rect x="39" y="20" width="22" height="15" rx="7" fill="#3ecf8e"/><rect x="29" y="42.5" width="42" height="15" rx="7" fill="#7fa8ff"/><rect x="15" y="65" width="70" height="16" rx="8" fill="#4f8cff"/></svg></div><div class="cap">64</div></div>
      <div class="fav"><div class="chip" style="width:56px;height:56px;"><svg width="38" height="38" viewBox="0 0 100 100"><rect x="39" y="20" width="22" height="15" rx="7" fill="#3ecf8e"/><rect x="29" y="42.5" width="42" height="15" rx="7" fill="#7fa8ff"/><rect x="15" y="65" width="70" height="16" rx="8" fill="#4f8cff"/></svg></div><div class="cap">32</div></div>
      <div class="fav"><div class="chip" style="width:40px;height:40px;"><svg width="27" height="27" viewBox="0 0 100 100"><rect x="39" y="20" width="22" height="15" rx="7" fill="#3ecf8e"/><rect x="29" y="42.5" width="42" height="15" rx="7" fill="#7fa8ff"/><rect x="15" y="65" width="70" height="16" rx="8" fill="#4f8cff"/></svg></div><div class="cap">16</div></div>
    </div>
    <div class="favnote">Live in the app already: the browser-tab favicon and every in-product wordmark now use this mark. It stays crisp down to 16px.</div>
  </div>
</div>
</body>
</html>
