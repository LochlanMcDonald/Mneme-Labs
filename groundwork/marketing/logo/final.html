<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif; background: #333; -webkit-font-smoothing: antialiased; }
  svg { display:block; }

  #sheet {
    width: 1600px; padding: 80px; color: #e6f4ff;
    background:
      radial-gradient(1000px 700px at 84% -8%, rgba(168,85,247,0.16), transparent 60%),
      radial-gradient(900px 600px at -8% 106%, rgba(34,211,238,0.14), transparent 60%),
      #05070f;
  }
  .head { font-size: 24px; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; margin-bottom: 40px;
    background:linear-gradient(90deg,#22d3ee,#a855f7); -webkit-background-clip:text; background-clip:text; color:transparent; }

  .hero { display:flex; align-items:center; gap: 40px; margin-bottom: 66px; }
  .hero svg { width: 156px; height: 156px; }
  .hero .wm { font-size: 96px; font-weight: 800; letter-spacing: -0.03em; color:#eaf6ff; }

  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap: 28px; margin-bottom: 28px; }
  .tile { border-radius: 24px; padding: 44px; display:flex; flex-direction:column; align-items:center; gap: 24px; min-height: 300px; justify-content:center; }
  .tile .cap { font-size: 20px; font-weight: 700; }
  .tile.dark { background:#0a0f1c; border:1px solid rgba(120,180,255,0.14); }
  .tile.dark .cap { color:#8aa0c6; }
  .tile.light { background:#f4f7fc; }
  .tile.light .cap { color:#5a6b86; }
  .tile.blue { background:#4f8cff; }
  .tile.blue .cap { color:#e8efff; }
  .tile svg { width: 132px; height: 132px; }

  .badge-row { display:flex; align-items:flex-end; gap: 48px; margin-bottom: 30px; }
  .badge { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .badge .cap { font-size:18px; color:#8aa0c6; font-weight:600; }
  .badge .icon { border-radius: 22%; overflow:hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

  .favbar { display:flex; align-items:flex-end; gap: 34px; }
  .favbar .fav { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .favbar .fav .chip { background:#05070f; border:1px solid rgba(120,180,255,0.18); border-radius: 22%; display:flex; align-items:center; justify-content:center; }
  .favbar .fav .cap { color:#8aa0c6; font-size:16px; font-weight:600; }
  .favnote { color:#8aa0c6; font-size: 20px; max-width: 560px; line-height:1.5; padding-bottom: 6px; }

  .sep { height:1px; background: rgba(120,180,255,0.12); margin: 58px 0; }
</style>
</head>
<body>
<div id="sheet">
  <div class="head">Groundwork · brand mark</div>

  <div class="hero">
    <svg viewBox="0 0 100 100"><polygon points="44,22 62,31 44,40 26,31" fill="#7df3ff"/><polygon points="26,31 44,40 44,47 26,38" fill="#22d3ee"/><polygon points="62,31 44,40 44,47 62,38" fill="#0e7490"/><polygon points="56,38 74,47 56,56 38,47" fill="#9ad4ff"/><polygon points="38,47 56,56 56,63 38,54" fill="#4f8cff"/><polygon points="74,47 56,56 56,63 74,54" fill="#3b5bdb"/><polygon points="44,54 62,63 44,72 26,63" fill="#d3b0ff"/><polygon points="26,63 44,72 44,79 26,70" fill="#a855f7"/><polygon points="62,63 44,72 44,79 62,70" fill="#7c3aed"/></svg>
    <span class="wm">Groundwork</span>
  </div>

  <div class="row">
    <div class="tile dark">
      <svg viewBox="0 0 100 100"><polygon points="44,22 62,31 44,40 26,31" fill="#7df3ff"/><polygon points="26,31 44,40 44,47 26,38" fill="#22d3ee"/><polygon points="62,31 44,40 44,47 62,38" fill="#0e7490"/><polygon points="56,38 74,47 56,56 38,47" fill="#9ad4ff"/><polygon points="38,47 56,56 56,63 38,54" fill="#4f8cff"/><polygon points="74,47 56,56 56,63 74,54" fill="#3b5bdb"/><polygon points="44,54 62,63 44,72 26,63" fill="#d3b0ff"/><polygon points="26,63 44,72 44,79 26,70" fill="#a855f7"/><polygon points="62,63 44,72 44,79 62,70" fill="#7c3aed"/></svg>
      <div class="cap">Primary · on dark</div>
    </div>
    <div class="tile light">
      <svg viewBox="0 0 100 100"><polygon points="44,22 62,31 44,40 26,31" fill="#6ea0ff"/><polygon points="26,31 44,40 44,47 26,38" fill="#4f8cff"/><polygon points="62,31 44,40 44,47 62,38" fill="#2f4fb0"/><polygon points="56,38 74,47 56,56 38,47" fill="#6ea0ff"/><polygon points="38,47 56,56 56,63 38,54" fill="#4f8cff"/><polygon points="74,47 56,56 56,63 74,54" fill="#2f4fb0"/><polygon points="44,54 62,63 44,72 26,63" fill="#6ea0ff"/><polygon points="26,63 44,72 44,79 26,70" fill="#4f8cff"/><polygon points="62,63 44,72 44,79 62,70" fill="#2f4fb0"/></svg>
      <div class="cap">On light · mono blue</div>
    </div>
    <div class="tile blue">
      <svg viewBox="0 0 100 100"><polygon points="44,22 62,31 44,40 26,31" fill="#ffffff"/><polygon points="26,31 44,40 44,47 26,38" fill="#ffffff" opacity="0.72"/><polygon points="62,31 44,40 44,47 62,38" fill="#ffffff" opacity="0.45"/><polygon points="56,38 74,47 56,56 38,47" fill="#ffffff"/><polygon points="38,47 56,56 56,63 38,54" fill="#ffffff" opacity="0.72"/><polygon points="74,47 56,56 56,63 74,54" fill="#ffffff" opacity="0.45"/><polygon points="44,54 62,63 44,72 26,63" fill="#ffffff"/><polygon points="26,63 44,72 44,79 26,70" fill="#ffffff" opacity="0.72"/><polygon points="62,63 44,72 44,79 62,70" fill="#ffffff" opacity="0.45"/></svg>
      <div class="cap">Reversed · white 3D</div>
    </div>
  </div>

  <div class="sep"></div>

  <div class="head" style="margin-bottom:36px;">App icon &amp; favicon</div>
  <div class="badge-row">
    <div class="badge">
      <div class="icon"><svg width="200" height="200" viewBox="0 0 100 100"><rect width="100" height="100" fill="#0c111b"/><polygon points="44,22 62,31 44,40 26,31" fill="#7df3ff"/><polygon points="26,31 44,40 44,47 26,38" fill="#22d3ee"/><polygon points="62,31 44,40 44,47 62,38" fill="#0e7490"/><polygon points="56,38 74,47 56,56 38,47" fill="#9ad4ff"/><polygon points="38,47 56,56 56,63 38,54" fill="#4f8cff"/><polygon points="74,47 56,56 56,63 74,54" fill="#3b5bdb"/><polygon points="44,54 62,63 44,72 26,63" fill="#d3b0ff"/><polygon points="26,63 44,72 44,79 26,70" fill="#a855f7"/><polygon points="62,63 44,72 44,79 62,70" fill="#7c3aed"/></svg></div>
      <div class="cap">App icon 512px</div>
    </div>
    <div class="favbar">
      <div class="fav"><div class="chip" style="width:96px;height:96px;"><svg width="66" height="66" viewBox="0 0 100 100"><polygon points="44,22 62,31 44,40 26,31" fill="#7df3ff"/><polygon points="26,31 44,40 44,47 26,38" fill="#22d3ee"/><polygon points="62,31 44,40 44,47 62,38" fill="#0e7490"/><polygon points="56,38 74,47 56,56 38,47" fill="#9ad4ff"/><polygon points="38,47 56,56 56,63 38,54" fill="#4f8cff"/><polygon points="74,47 56,56 56,63 74,54" fill="#3b5bdb"/><polygon points="44,54 62,63 44,72 26,63" fill="#d3b0ff"/><polygon points="26,63 44,72 44,79 26,70" fill="#a855f7"/><polygon points="62,63 44,72 44,79 62,70" fill="#7c3aed"/></svg></div><div class="cap">64</div></div>
      <div class="fav"><div class="chip" style="width:56px;height:56px;"><svg width="40" height="40" viewBox="0 0 100 100"><polygon points="44,22 62,31 44,40 26,31" fill="#7df3ff"/><polygon points="26,31 44,40 44,47 26,38" fill="#22d3ee"/><polygon points="62,31 44,40 44,47 62,38" fill="#0e7490"/><polygon points="56,38 74,47 56,56 38,47" fill="#9ad4ff"/><polygon points="38,47 56,56 56,63 38,54" fill="#4f8cff"/><polygon points="74,47 56,56 56,63 74,54" fill="#3b5bdb"/><polygon points="44,54 62,63 44,72 26,63" fill="#d3b0ff"/><polygon points="26,63 44,72 44,79 26,70" fill="#a855f7"/><polygon points="62,63 44,72 44,79 62,70" fill="#7c3aed"/></svg></div><div class="cap">32</div></div>
      <div class="fav"><div class="chip" style="width:40px;height:40px;"><svg width="29" height="29" viewBox="0 0 100 100"><polygon points="44,22 62,31 44,40 26,31" fill="#7df3ff"/><polygon points="26,31 44,40 44,47 26,38" fill="#22d3ee"/><polygon points="62,31 44,40 44,47 62,38" fill="#0e7490"/><polygon points="56,38 74,47 56,56 38,47" fill="#9ad4ff"/><polygon points="38,47 56,56 56,63 38,54" fill="#4f8cff"/><polygon points="74,47 56,56 56,63 74,54" fill="#3b5bdb"/><polygon points="44,54 62,63 44,72 26,63" fill="#d3b0ff"/><polygon points="26,63 44,72 44,79 26,70" fill="#a855f7"/><polygon points="62,63 44,72 44,79 62,70" fill="#7c3aed"/></svg></div><div class="cap">16</div></div>
    </div>
    <div class="favnote">Live in the app already: the browser-tab favicon and every in-product wordmark now use this mark.</div>
  </div>
</div>
</body>
</html>
