<!doctype html>
<html><head><meta charset="utf-8"/><style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#333;}
  #avatar{width:1080px;height:1080px;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(760px 620px at 78% -8%, rgba(79,140,255,0.26), transparent 60%),
      radial-gradient(680px 560px at 12% 110%, rgba(62,207,142,0.14), transparent 60%),
      #0c111b;}
  #avatar svg{width:560px;height:560px;filter:drop-shadow(0 30px 70px rgba(79,140,255,0.35));}
</style></head><body>
  <div id="avatar">
    <svg viewBox="0 0 100 100">
      <rect x="39" y="20" width="22" height="15" rx="7" fill="#3ecf8e"/>
      <rect x="29" y="42.5" width="42" height="15" rx="7" fill="#7fa8ff"/>
      <rect x="15" y="65" width="70" height="16" rx="8" fill="#4f8cff"/>
    </svg>
  </div>
</body></html>
