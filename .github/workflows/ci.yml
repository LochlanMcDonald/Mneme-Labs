name: CI

on:
  push:
    branches: [main]
    paths:
      - 'groundwork/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'groundwork/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: groundwork/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: groundwork

      - name: Run tests
        run: npm test
        working-directory: groundwork

      - name: Build
        run: npm run build
        working-directory: groundwork
