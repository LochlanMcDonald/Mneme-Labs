name: Deploy site

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'groundwork/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: groundwork/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: groundwork

      - name: Run tests
        run: npm test
        working-directory: groundwork

      - name: Build Groundwork
        run: npm run build
        working-directory: groundwork

      # The Pages artifact serves the existing root site as-is and mounts
      # the Groundwork app at /groundwork/.
      - name: Assemble site
        run: |
          mkdir -p _site/groundwork
          cp index.html LICENSE _site/
          cp -r images _site/images
          cp -r groundwork/dist/. _site/groundwork/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - id: deployment
        uses: actions/deploy-pages@v4
